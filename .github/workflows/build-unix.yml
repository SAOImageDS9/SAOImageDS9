name: build-unix
run-name: Build UNIX

on:
  push:
    branches:
    - master
    tags:
    - '*'
  pull_request:

#Reduces GH Action duplication:
# Cancels the previous pipeline for this ref it is still running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-builds:
    defaults:
      run:
        shell: bash

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Ubuntu Latest
            os: ubuntu-latest

          # - name: Ubuntu 24.04 ARM
          #   os: ubuntu-24.04-arm

          - name: macOS Latest ARM
            os: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2

    - name: Install dependencies
      env:
        DS9_BUILD_OS: ${{ matrix.os }}
      run: |
        source .github/scripts/setup.sh

    - name: Configure
      run: |
        if [ "${RUNNER_OS}" == "macOS" ]; then
          export PKG_CONFIG_PATH=/opt/X11/lib/pkgconfig:/opt/X11/share/pkgconfig/
        fi
        unix/configure

    - name: Build
      run: |
        if [ "${RUNNER_OS}" == "macOS" ]; then
          export PKG_CONFIG_PATH=/opt/X11/lib/pkgconfig:/opt/X11/share/pkgconfig/
        fi
        make

    - name: Check executable
      run: |
        ./bin/ds9 -help
